<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>벽돌깨기 - 스테이지 모험</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background-color: #1e293b; box-shadow: 0 0 30px rgba(0, 0, 0, 0.7); display: block; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15, 23, 42, 0.9); z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-white font-sans selection:bg-none">
<nav class="absolute top-4 left-4 z-20 flex gap-2">
    <span class="px-3 py-1 bg-gray-800 rounded-full text-xs font-bold text-white shadow-lg">벽돌깨기</span>
    <a href="index2.html" class="px-3 py-1 bg-white/10 hover:bg-white/20 rounded-full text-xs transition-colors">끝말잇기 이동 →</a>
</nav>
    
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="startScreen" class="overlay">
            <h1 class="text-6xl md:text-8xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-600">BREAKOUT</h1>
            <button id="startBtn" class="px-10 py-4 bg-blue-600 rounded-full text-xl font-bold hover:scale-110 transition-transform shadow-lg shadow-blue-500/50">게임 시작</button>
        </div>
        <div id="gameOverScreen" class="overlay hidden">
            <h1 class="text-6xl font-black text-red-500 mb-4">GAME OVER</h1>
            <p id="finalScore" class="text-2xl mb-8"></p>
            <button id="restartBtn" class="px-8 py-3 bg-red-600 rounded-full text-lg">다시 하기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameState = 'START', score = 0, lives = 3, stage = 1;
        let balls = [], items = [], bricks = [], paddle = {width: 0, height: 15, x: 0, y: 0};
        let cWidth = 800, cHeight = 600;

        function resize() {
            cWidth = Math.min(800, window.innerWidth);
            cHeight = Math.min(600, window.innerHeight);
            canvas.width = cWidth; canvas.height = cHeight;
            paddle.width = cWidth * 0.15;
            paddle.y = cHeight - 30;
            paddle.x = (cWidth - paddle.width) / 2;
            draw(); // 창 크기 변경 시 즉시 다시 그리기
        }

        function drawHeart(x, y, size) {
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            let topCurveHeight = size * 0.3;
            ctx.moveTo(x, y + topCurveHeight);
            ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + topCurveHeight);
            ctx.bezierCurveTo(x - size / 2, y + (size + topCurveHeight) / 2, x, y + (size + topCurveHeight) / 1.5, x, y + size);
            ctx.bezierCurveTo(x, y + (size + topCurveHeight) / 1.5, x + size / 2, y + (size + topCurveHeight) / 2, x + size / 2, y + topCurveHeight);
            ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + topCurveHeight);
            ctx.fill();
        }

        function setupStage() {
            bricks = [];
            const cols = 8, rows = 5;
            const bW = (cWidth - 100) / cols;
            const colors = ['#f43f5e', '#f97316', '#eab308', '#22c55e', '#06b6d4'];
            for (let c = 0; c < cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < rows; r++) {
                    bricks[c][r] = { x: 50 + c * bW, y: 80 + r * 40, w: bW - 5, h: 30, status: 1, color: colors[r % colors.length] };
                }
            }
            let speed = 4 + (stage * 0.5);
            balls = [{x: cWidth/2, y: cHeight - 60, dx: speed, dy: -speed, r: 8}];
            items = [];
        }

        function drawUI() {
            ctx.fillStyle = "#fff";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText(`점수: ${score} | 스테이지: ${stage}`, 20, 30);
            for(let i=0; i<lives; i++) drawHeart(cWidth - 40 - (i * 35), 20, 20);
        }

        function update() {
            let activeBricks = 0;
            balls.forEach((b) => {
                b.x += b.dx; b.y += b.dy;
                if (b.x < 0 || b.x > cWidth) b.dx *= -1;
                if (b.y < 0) b.dy *= -1;
                if (b.y > paddle.y && b.y < paddle.y + 15 && b.x > paddle.x && b.x < paddle.x + paddle.width) b.dy *= -1;
                
                bricks.forEach(col => col.forEach(br => {
                    if (br.status && b.x > br.x && b.x < br.x + br.w && b.y > br.y && b.y < br.y + br.h) {
                        br.status = 0; b.dy *= -1; score += 10;
                        if(Math.random() < 0.2) items.push({x: br.x + br.w/2, y: br.y, dy: 3});
                    }
                    if (br.status) activeBricks++;
                }));
            });
            
            items.forEach((item, i) => {
                item.y += item.dy;
                if (item.y > paddle.y && item.x > paddle.x && item.x < paddle.x + paddle.width) {
                    items.splice(i, 1);
                    balls.push({x: balls[0].x, y: balls[0].y, dx: -balls[0].dx, dy: balls[0].dy, r: 8});
                } else if(item.y > cHeight) items.splice(i, 1);
            });

            if (activeBricks === 0) { stage++; setupStage(); }
            balls = balls.filter(b => b.y < cHeight);
            if (balls.length === 0) { lives--; if(lives === 0) gameState = 'GAMEOVER'; else balls = [{x: cWidth/2, y: cHeight - 60, dx: 4 + stage, dy: -4 - stage, r: 8}]; }
        }

        function draw() {
            ctx.clearRect(0, 0, cWidth, cHeight);
            ctx.fillStyle = "#3b82f6";
            ctx.fillRect(paddle.x, paddle.y, paddle.width, 15);
            balls.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
            bricks.forEach(col => col.forEach(br => { if(br.status) { ctx.fillStyle = br.color; ctx.fillRect(br.x, br.y, br.w, br.h); } }));
            items.forEach(it => { ctx.fillStyle = "#10b981"; ctx.fillRect(it.x-5, it.y, 10, 10); });
            drawUI();
        }

        function gameLoop() {
            if (gameState === 'PLAYING') { update(); draw(); requestAnimationFrame(gameLoop); }
            else if (gameState === 'GAMEOVER') { document.getElementById('gameOverScreen').classList.remove('hidden'); document.getElementById('finalScore').innerText = `최종 점수: ${score}`; }
        }

        window.addEventListener('mousemove', e => { 
            const rect = canvas.getBoundingClientRect();
            paddle.x = e.clientX - rect.left - paddle.width/2; 
        });

        document.getElementById('startBtn').addEventListener('click', () => { 
            gameState = 'PLAYING'; 
            document.getElementById('startScreen').classList.add('hidden'); 
            setupStage(); 
            gameLoop(); 
        });

        document.getElementById('restartBtn').addEventListener('click', () => location.reload());
        
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
